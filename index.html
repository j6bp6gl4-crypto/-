        /* 🚨 確保卡片本身是相對定位，這樣休眠圖示才能對準它的右上角 */
        .expert-card {
            position: relative; /* 這一行很重要，請確保你的 CSS 裡有這行 */
            /* ...其他原本的樣式保持不變... */
        }

</head>

🔍 步驟：請選擇賽事項目 按對比送出 就能開始全域對比 / 或單獨點選好手卡片按送出也能比照成績清單 </p>
